steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/garmin-swimfo-ows:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/garmin-swimfo-ows:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - garmin-swimfo-ows
      - --image=europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/garmin-swimfo-ows:$COMMIT_SHA
      - --region=europe-west4
      - --platform=managed
      # Traffic is tiny (each watch polls every 30 min; responses cached 1h),
      # so a single instance is plenty and minimizes upstream fetches — the
      # dominant CPU-time cost under request-based billing. Scale to zero when
      # idle; CPU (1 vCPU) and request concurrency (80) stay at Cloud Run
      # defaults. Fractional CPU (< 1 vCPU) is not an option here: the service
      # mounts a Cloud Storage volume (configured on the service, outside this
      # file), which requires the gen2 execution environment, and gen2 requires
      # >= 1 vCPU.
      - --max-instances=1
      - --min-instances=0

options:
  logging: CLOUD_LOGGING_ONLY
